<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky World - Manager Control Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0A2540;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .admin-card {
            background: #1E293B;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #94A3B8;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #475569;
            background: #0F172A;
            color: white;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn-save {
            background-color: #10B981;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-save:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2 style="text-align: center; margin-bottom: 20px; color: #FFC01D;">Manager Control Panel</h2>
        
        <div class="form-group">
            <label>Tracking Number</label>
            <input type="text" id="adminTrackingNum" placeholder="e.g. DLV123456789">
        </div>
        
        <div class="form-group">
            <label>Shipment Status</label>
            <select id="adminStatus">
                <option value="Order Received">Order Received</option>
                <option value="Picked Up">Picked Up</option>
                <option value="In Transit">In Transit</option>
                <option value="Out for Delivery">Out for Delivery</option>
                <option value="Delivered">Delivered</option>
            </select>
        </div>

        <div class="form-group">
            <label>Destination</label>
            <input type="text" id="adminDestination" placeholder="e.g. Mexico City">
        </div>

        <button class="btn-save" onclick="saveShipmentToSupabase()">Save to Database</button>
        <div id="adminMessage" style="margin-top: 15px; text-align: center; font-size: 14px;"></div>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #6392B2; text-decoration: none; font-size: 13px;">← Exit to Public Site</a>
        </div>
    </div>

    <!-- Load Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://vecqmerzqcxzcldldvhaf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_3oCv-YpSvXAswWuD5YjtJg_7AxaFc3x";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function saveShipmentToSupabase() {
            const trackingNumber = document.getElementById("adminTrackingNum").value.trim();
            const status = document.getElementById("adminStatus").value;
            const destination = document.getElementById("adminDestination").value.trim();
            const msgEl = document.getElementById("adminMessage");

            if (!trackingNumber) {
                msgEl.innerHTML = `<span style="color:#ef4444;">Please enter a tracking number.</span>`;
                return;
            }

            msgEl.innerHTML = `<span style="color:#3b82f6;">Saving to database...</span>`;

            try {
                // Upsert checks if tracking number exists; updates it or inserts a new one
                const { error } = await supabaseClient
                    .from('shipments')
                    .upsert([
                        { tracking_number: trackingNumber, status: status, destination: destination }
                    ], { onConflict: ['tracking_number'] });

                if (error) {
                    msgEl.innerHTML = `<span style="color:#ef4444;">Error: ${error.message}</span>`;
                } else {
                    msgEl.innerHTML = `<span style="color:#10b981; font-weight:bold;">Successfully saved ${trackingNumber}!</span>`;
                }
            } catch (err) {
                msgEl.innerHTML = `<span style="color:#ef4444;">Failed to connect to database.</span>`;
            }
        }
    </script>
</body>
</html>
