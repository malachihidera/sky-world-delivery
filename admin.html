<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky World - Manager Control Panel</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0f172a; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 40px auto; background: #1e293b; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2, h3 { color: #38bdf8; text-align: center; }
        label { font-size: 0.85rem; color: #94a3b8; display: block; margin-bottom: 5px; margin-top: 15px; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 20px; background: #22c55e; color: #0f172a; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #16a34a; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #94a3b8; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- PIN LOCK SCREEN -->
        <div id="adminLockScreen">
            <h2>Manager Login</h2>
            <label>Enter Passcode (PIN)</label>
            <input type="password" id="adminPasscode" placeholder="Enter 4-digit PIN">
            <button onclick="unlockAdmin()" style="background: #38bdf8;">Unlock Panel</button>
            <p id="lockError" style="color: #ef4444; text-align: center; margin-top: 10px;"></p>
        </div>

        <!-- ADMIN PANEL CONTENT (Hidden until unlocked) -->
        <div id="adminContent" style="display: none;">
            <h3>Create / Update Shipment</h3>
            <form id="createShipmentForm" onsubmit="createShipment(event)">
                <label>Tracking Number</label>
                <input type="text" id="newTrackingNum" placeholder="e.g. DLV156879502" required>

                <label>Initial/Current Status</label>
                <select id="newStatus">
                    <option value="Order Received">Order Received</option>
                    <option value="Picked Up">Picked Up</option>
                    <option value="In Transit">In Transit</option>
                    <option value="Out for Delivery">Out for Delivery</option>
                    <option value="Delivered">Delivered</option>
                </select>

                <label>Destination</label>
                <input type="text" id="newDestination" placeholder="e.g. Mexico City" required>

                <button type="submit">Save to Database</button>
            </form>

            <div id="createFeedback" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>

            <a href="index.html" class="back-link">&larr; Exit to Public Site</a>
        </div>
    </div>

    <script>
        // 1. Initialize Supabase Client
        const SUPABASE_URL = "https://vecqmerzqcxzcldldvhaf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_3oCv-YpSvXAswWuD5YjtJg_7AxaFc3x";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const MANAGER_PIN = "1234";

        function unlockAdmin() {
            const pin = document.getElementById("adminPasscode").value;
            const errorEl = document.getElementById("lockError");

            if (pin === MANAGER_PIN) {
                document.getElementById("adminLockScreen").style.display = "none";
                document.getElementById("adminContent").style.display = "block";
            } else {
                errorEl.textContent = "Incorrect PIN code!";
            }
        }

        // 2. Save/Update Shipment directly to Supabase
        async function createShipment(event) {
            if (event) event.preventDefault();
            
            const trackingNum = document.getElementById("newTrackingNum").value.trim();
            const destination = document.getElementById("newDestination").value.trim();
            const status = document.getElementById("newStatus").value;
            const feedbackDiv = document.getElementById("createFeedback");

            if (!trackingNum) {
                feedbackDiv.innerHTML = `<span style="color:red;">Please enter a tracking number.</span>`;
                return;
            }

            feedbackDiv.innerHTML = `<span style="color:#38bdf8;">Saving to database...</span>`;

            const { error } = await supabaseClient
                .from('shipments')
                .upsert([
                    { tracking_number: trackingNum, destination: destination, status: status, weight: "2.5 kg" }
                ], { onConflict: ['tracking_number'] });

            if (error) {
                feedbackDiv.innerHTML = `<span style="color:red;">Error: ${error.message}</span>`;
            } else {
                feedbackDiv.innerHTML = `<span style="color:#22c55e;">Successfully saved ${trackingNum}!</span>`;
            }
        }
    </script>
</body>
</html>
