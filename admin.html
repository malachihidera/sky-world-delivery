<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky World - Manager Control Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0A2540;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .admin-card {
            background: #1E293B;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #94A3B8;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #475569;
            background: #0F172A;
            color: white;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn-save {
            background-color: #10B981;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-save:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2 style="text-align: center; margin-bottom: 20px; color: #FFC01D;">Manager Control Panel</h2>
        
        <div class="form-group">
            <label>Tracking Number</label>
            <input type="text" id="adminTrackingNum" placeholder="e.g. DLV123456789">
        </div>
        
        <div class="form-group">
            <label>Shipment Status</label>
            <select id="adminStatus">
                <option value="Order Received">Order Received</option>
                <option value="Picked Up">Picked Up</option>
                <option value="In Transit">In Transit</option>
                <option value="Out for Delivery">Out for Delivery</option>
                <option value="Delivered">Delivered</option>
            </select>
        </div>

        <div class="form-group">
            <label>Destination</label>
            <input type="text" id="adminDestination" placeholder="e.g. Mexico City">
        </div>

        <button class="btn-save" onclick="saveShipmentLocally()">Save to Database</button>
        <div id="adminMessage" style="margin-top: 15px; text-align: center; font-size: 14px;"></div>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #6392B2; text-decoration: none; font-size: 13px;">← Exit to Public Site</a>
        </div>
    </div>

    <script>
        function saveShipmentLocally() {
            const trackingNumber = document.getElementById("adminTrackingNum").value.trim();
            const status = document.getElementById("adminStatus").value;
            const destination = document.getElementById("adminDestination").value.trim() || "International Hub";
            const msgEl = document.getElementById("adminMessage");

            if (!trackingNumber) {
                msgEl.innerHTML = `<span style="color:#ef4444;">Please enter a tracking number.</span>`;
                return;
            }

            // Save directly to browser storage
            const shipmentData = {
                tracking_number: trackingNumber,
                status: status,
                destination: destination,
                weight: "4.5 kg"
            };

            localStorage.setItem("shipment_" + trackingNumber, JSON.stringify(shipmentData));
            msgEl.innerHTML = `<span style="color:#10b981; font-weight:bold;">Successfully saved ${trackingNumber}!</span>`;
        }
    </script>
</body>
</html>
