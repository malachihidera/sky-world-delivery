<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky World Delivery - Global Express Services</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f8fafc; color: #1e293b; }
        header { background: #0A2540; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 20px; color: #FFC01D; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
        .hero { background: linear-gradient(rgba(10,37,64,0.8), rgba(10,37,64,0.8)), url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1200&q=80') center/cover; padding: 60px 20px; text-align: center; color: white; }
        .track-box { background: white; padding: 25px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: #1e293b; }
        .track-box input { width: 70%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px 0 0 6px; font-size: 14px; outline: none; }
        .track-box button { width: 28%; padding: 12px; background: #FFC01D; border: none; font-weight: bold; border-radius: 0 6px 6px 0; cursor: pointer; color: #0A2540; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .section-title { text-align: center; margin-bottom: 30px; font-size: 24px; color: #0A2540; }
        .booking-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold; color: #475569; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn-book { background: #FFC01D; color: #0A2540; border: none; padding: 14px; width: 100%; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-plane-departure"></i> SKY WORLD</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="admin.html">Staff Login</a>
        </nav>
    </header>

    <div class="hero">
        <h1>Global Express Delivery Services</h1>
        <p>Reliable, Fast, and Secure Freight & Courier Solutions Worldwide.</p>
        
        <div class="track-box">
            <h3><i class="fa-solid fa-magnifying-glass"></i> Track Your Shipment</h3>
            <div style="display: flex; justify-content: center; margin-top: 15px;">
                <input type="text" id="trackingInput" placeholder="Enter Tracking ID (e.g. DLV12345)">
                <button onclick="trackPackage()">Track</button>
            </div>
            <div id="trackingResult" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div class="container">
        <h2 class="section-title">Book a Package Delivery</h2>
        <div class="booking-card">
            <form onsubmit="sendBookingToWhatsApp(event)">
                <div class="form-group">
                    <label>Your Full Name</label>
                    <input type="text" id="custName" placeholder="e.g. John Doe" required>
                </div>
                <div class="form-group">
                    <label>Pickup & Delivery Address</label>
                    <input type="text" id="addresses" placeholder="Sender Address -> Recipient Address" required>
                </div>
                <div class="form-group">
                    <label>Package Description & Weight</label>
                    <input type="text" id="pkgDetails" placeholder="e.g. Box of Documents, 2.5kg" required>
                </div>
                <button type="submit" class="btn-book"><i class="fa-brands fa-whatsapp"></i> Send Order Details to Manager</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
